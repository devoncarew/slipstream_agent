name: slipstream_agent
permissions: read-all

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/slipstream_agent.yaml'
      - 'slipstream_agent/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/slipstream_agent.yaml'
      - 'slipstream_agent/**'

defaults:
  run:
    working-directory: slipstream_agent/

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1

      # Dart checks.
      - run: dart pub get
      - run: dart analyze
      - run: dart format --output=none --set-exit-if-changed .
      - run: dart test
