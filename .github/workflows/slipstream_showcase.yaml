name: slipstream_showcase
permissions: read-all

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/slipstream_showcase.yaml'
      - 'slipstream_showcase/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/slipstream_showcase.yaml'
      - 'slipstream_showcase/**'

defaults:
  run:
    working-directory: slipstream_showcase/

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: devoncarew/setup-flutter-action@v1

      - run: flutter pub get
      - run: flutter analyze
      - run: dart format --output=none --set-exit-if-changed .
